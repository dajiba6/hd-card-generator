<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1644">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1644px;
    height: 918px;
    overflow: hidden;
    font-family: 'Noto Sans SC', sans-serif;
  }

  .card {
    position: relative;
    width: 1644px;
    height: 918px;
  }

  .card img.bg {
    position: absolute;
    top: 0;
    left: 0;
    width: 1644px;
    height: 918px;
  }

  .title {
    position: absolute;
    top: 200px;
    left: 120px;
    width: 750px;
    font-size: 72px;
    font-weight: 900;
    color: #1a1a1a;
    line-height: 1.25;
    letter-spacing: 2px;
    z-index: 10;
    text-shadow: 0 2px 8px rgba(255, 200, 0, 0.3);
  }

  .tutor {
    position: absolute;
    top: 670px;
    left: 210px;
    font-size: 30px;
    font-weight: 700;
    color: #555;
    z-index: 10;
    letter-spacing: 1px;
  }
</style>
</head>
<body>
  <div class="card">
    <img class="bg" src="{{TEMPLATE_PATH}}" alt="template">
    <div class="title">{{TITLE}}</div>
    <div class="tutor">{{TUTOR}}</div>
  </div>
</body>
</html>
